name: "🤖 AMA — Answer the AI"

# SECURITY + COST MODEL (public repo):
# - Auto-answers EVERY newly opened issue (questions, bug reports, anything).
#   No form or label required — robust across all devices.
# - Guardrails cap spend: a per-user daily limit (maintainers exempt) and a
#   repo-wide monthly cap. Over either limit, the bot posts a friendly notice
#   instead of running.
# - A maintainer can force a re-run on any older issue by adding the `question` label.
# - All untrusted text (issue body, question, model answer) is passed via `env:`
#   and referenced as quoted variables — never inlined into a run:/script: body.
# - opencode runs sandboxed (bash/write/edit/webfetch off — see ama-agent.md);
#   the token is contents:read only and not persisted, so nothing can edit code.

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

concurrency:
  group: ama-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  answer:
    # Run for: ANY newly opened issue, OR a maintainer-forced re-run (question
    # label added). Skip issues already answered and anything opened by a bot.
    if: >
      (github.event.action == 'opened' &&
        github.event.issue.user.type != 'Bot' &&
        !contains(github.event.issue.labels.*.name, 'answered')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'question')
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
    - name: Guardrails — rate limit & monthly cap
      id: gate
      uses: actions/github-script@v7
      with:
        script: |
          // Tune these two numbers to taste.
          const PER_USER_PER_DAY = 5;
          const MONTHLY_CAP = 200;

          const { owner, repo } = context.repo;
          const issue = context.payload.issue;
          const issue_number = issue.number;
          const author = issue.user.login;
          const isMaintainer = ['OWNER', 'MEMBER', 'COLLABORATOR']
            .includes(issue.author_association);

          const count = async (q) =>
            (await github.rest.search.issuesAndPullRequests({ q, per_page: 1 }))
              .data.total_count;

          const d = new Date();
          const dayAgo = new Date(d.getTime() - 86400000).toISOString().slice(0, 10);
          const monthStart = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-01`;

          let proceed = true, reason = '';

          // Monthly cap applies to everyone (approximate: counts answered issues
          // this month — a soft budget guard, not exact billing).
          if (await count(`repo:${owner}/${repo} label:answered created:>=${monthStart}`) >= MONTHLY_CAP) {
            proceed = false; reason = 'monthly-cap';
          }

          // Per-user daily limit (maintainers exempt). Counts how many of this
          // author's issues we've already answered in the last day.
          if (proceed && !isMaintainer) {
            const used = await count(
              `repo:${owner}/${repo} type:issue author:${author} label:answered created:>=${dayAgo}`);
            if (used >= PER_USER_PER_DAY) { proceed = false; reason = 'rate-limit'; }
          }

          core.setOutput('proceed', String(proceed));

          if (!proceed) {
            const body = reason === 'monthly-cap'
              ? "## 🤖 Bannerlator AI\n\n⚠️ The AI has reached its question limit for this month. Please try again next month."
              : `## 🤖 Bannerlator AI\n\n⚠️ You've reached the limit of ${PER_USER_PER_DAY} questions per day. Please try again tomorrow.`;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Check out repo
      if: steps.gate.outputs.proceed == 'true'
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        # Don't leave the GITHUB_TOKEN in the runner's local .git/config.
        persist-credentials: false

    - name: Extract question from issue
      id: question
      if: steps.gate.outputs.proceed == 'true'
      env:
        # Untrusted. Only ever referenced as the quoted shell vars below.
        BODY: ${{ github.event.issue.body }}
        TITLE: ${{ github.event.issue.title }}
      run: |
        QUESTION=$(printf '%s' "$BODY" \
          | sed '/^### Your question$/d' \
          | sed '/^[[:space:]]*$/d')
        if [ -z "$QUESTION" ]; then
          QUESTION=$(printf '%s' "$BODY")
        fi
        # Prepend the issue title for context (bug reports often put the whole
        # ask in the title with an empty body).
        QUESTION=$(printf 'Title: %s\n\n%s' "$TITLE" "$QUESTION")
        QUESTION=$(printf '%s' "$QUESTION" | head -c 4000)
        {
          echo "q<<__Q_EOF__"
          printf '%s\n' "$QUESTION"
          echo "__Q_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Install opencode
      if: steps.gate.outputs.proceed == 'true'
      # The npm package is `opencode-ai` (it installs an `opencode` binary).
      run: npm install -g opencode-ai@latest 2>&1 | tail -3

    - name: Configure opencode credentials
      id: creds
      if: steps.gate.outputs.proceed == 'true'
      env:
        OPENCODE_AUTH: ${{ secrets.OPENCODE_AUTH }}
      run: |
        if [ -z "$OPENCODE_AUTH" ]; then
          echo "status=no-auth" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        mkdir -p ~/.local/share/opencode
        ( umask 177; printf '%s' "$OPENCODE_AUTH" > ~/.local/share/opencode/auth.json )
        echo "status=ok" >> "$GITHUB_OUTPUT"

    - name: Answer via opencode big-pickle
      id: answer
      if: steps.gate.outputs.proceed == 'true' && steps.creds.outputs.status == 'ok'
      env:
        # Untrusted. Passed only as a single quoted argument to opencode.
        Q: ${{ steps.question.outputs.q }}
      run: |
        OUTPUT=$(opencode run "$Q" \
          --agent ama-agent \
          --model opencode/big-pickle \
          --format json \
          --pure \
          2>/dev/null || true)

        ANSWER=$(printf '%s' "$OUTPUT" | jq -s '
          [.[] | select(.type == "text" and .part.type == "text") | .part.text]
          | join("\n\n")
        ' --raw-output 2>/dev/null || true)

        if [ -z "$ANSWER" ] || [ "$ANSWER" = "null" ]; then
          ANSWER="⚠️ No answer generated. The AI may have timed out or hit an error."
        fi

        # Defense in depth: scrub anything that looks like a secret key.
        ANSWER=$(printf '%s' "$ANSWER" | sed -E 's/sk-[A-Za-z0-9_-]{16,}/[redacted]/g')

        {
          echo "ans<<__ANS_EOF__"
          printf '%s\n' "$ANSWER"
          echo "__ANS_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Remove credentials from runner
      if: always()
      run: rm -f ~/.local/share/opencode/auth.json

    - name: Post answer as comment
      if: steps.gate.outputs.proceed == 'true'
      uses: actions/github-script@v7
      env:
        STATUS: ${{ steps.creds.outputs.status }}
        ANSWER: ${{ steps.answer.outputs.ans }}
      with:
        script: |
          const status = process.env.STATUS;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          if (status === 'no-auth') {
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: [
                '## 🤖 Bannerlator AI',
                '',
                "⚠️ The **OPENCODE_AUTH** secret hasn't been configured yet.",
                '',
                '**For the repo owner:**',
                '1. Run locally: `cat ~/.local/share/opencode/auth.json`',
                '2. Copy the entire JSON object',
                '3. **Settings → Secrets and variables → Actions → New repository secret**',
                '4. Name it `OPENCODE_AUTH`, paste the JSON, save',
              ].join('\n'),
            });
            return;
          }

          const answer = process.env.ANSWER || '⚠️ No answer generated.';
          await github.rest.issues.createComment({
            owner, repo, issue_number,
            body: [
              '## 🤖 Bannerlator AI',
              '',
              answer,
              '',
              '---',
              `_Cited from the [Bannerlator codebase](https://github.com/${owner}/${repo}). For a follow-up, open a new question._`,
            ].join('\n'),
          });

          await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['answered'] });
